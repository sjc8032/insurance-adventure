        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 2em;
            margin: 20px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        h1 .subtitle {
            display: block;
            font-size: 0.5em;
            font-weight: normal;
            margin-top: 8px;
            opacity: 0.9;
        }

        h2 {
            color: #5a3e8e;
            margin-bottom: 12px;
            font-size: 1.3em;
        }

        .question-title {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 14px 22px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 1.3em;
        }

        .question-text {
            color: #555;
            line-height: 2;
            margin-bottom: 20px;
            font-size: 1.15em;
        }

        .question-text .highlight {
            color: #e74c3c;
            font-weight: bold;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            height: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #43e97b, #38f9d7);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #5a3e8e;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0d4f5;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #764ba2;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .bmi-display {
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 1.1em;
            font-weight: bold;
            display: none;
        }

        .bmi-normal { background: #d4edda; color: #155724; }
        .bmi-warning { background: #fff3cd; color: #856404; }
        .bmi-danger { background: #f8d7da; color: #721c24; }

        /* 分類標題 */
        .category-header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #f0e6ff, #e8d5f5);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: bold;
            color: #5a3e8e;
            font-size: 1.05em;
            margin-top: 8px;
        }

        .category-header:first-child {
            margin-top: 0;
        }

        /* 鼓勵訊息 */
        .encourage-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 14px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 10px;
            font-size: 1em;
            color: #8b4513;
            font-weight: bold;
            margin: 6px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 2px solid #e8e0f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .option-item:hover {
            border-color: #764ba2;
            background: #f8f4ff;
        }

        .option-item.selected {
            border-color: #764ba2;
            background: #ede4f7;
        }

        .option-item input[type="checkbox"] {
            display: none;
        }

        .option-check {
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 6px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-item.selected .option-check {
            background: #764ba2;
            border-color: #764ba2;
        }

        .option-item.selected .option-check::after {
            content: '\2713';
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .option-label {
            font-size: 1em;
            line-height: 1.4;
        }

        .none-option {
            grid-column: 1 / -1;
            background: #f0fff0;
            border-color: #b7e4c7;
            justify-content: center;
            font-weight: bold;
        }

        .none-option.selected {
            background: #d4edda;
            border-color: #28a745;
        }

        .none-option.selected .option-check {
            background: #28a745;
            border-color: #28a745;
        }

        .btn {
            display: inline-block;
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(118, 75, 162, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #e8e0f0;
            color: #5a3e8e;
        }

        .btn-secondary:hover {
            background: #d8cceb;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .result-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .result-insurance-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #5a3e8e;
        }

        .result-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .badge-standard { background: #d4edda; color: #155724; }
        .badge-light { background: #fff3cd; color: #856404; }
        .badge-medium { background: #ffeaa7; color: #6c5200; }
        .badge-heavy { background: #f8d7da; color: #721c24; }
        .badge-exclude { background: #d6e9ff; color: #004085; }
        .badge-defer { background: #e2d5f1; color: #4a2d7a; }
        .badge-decline { background: #c0392b; color: #fff; }

        .result-rate {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            margin: 12px 0;
        }

        .result-details {
            background: #f8f4ff;
            border-radius: 10px;
            padding: 16px;
            margin-top: 12px;
        }

        .result-details h4 {
            color: #5a3e8e;
            margin-bottom: 8px;
        }

        .result-details ul {
            list-style: none;
            padding: 0;
        }

        .result-details li {
            padding: 4px 0;
            font-size: 0.9em;
            color: #666;
        }

        .result-details li::before {
            content: '\2022 ';
            color: #764ba2;
        }

        .exclude-list {
            background: #d6e9ff;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 8px;
        }

        .exclude-list span {
            display: inline-block;
            background: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            margin: 3px;
            font-size: 0.85em;
            color: #004085;
        }

        .multiplier-info {
            text-align: center;
            color: #856404;
            font-size: 1.1em;
            margin-top: 8px;
        }

        .share-footer {
            text-align: center;
            padding: 20px;
            margin-top: 16px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .share-footer p {
            font-size: 1.1em;
            color: #5a3e8e;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .share-footer .share-url {
            font-size: 0.85em;
            color: #888;
            font-weight: normal;
        }

        .share-footer .share-author {
            font-size: 0.8em;
            color: #aaa;
            font-weight: normal;
            margin-top: 4px;
        }

        .share-footer .share-disclaimer {
            font-size: 0.7em;
            color: #bbb;
            font-weight: normal;
            margin-top: 10px;
            line-height: 1.6;
        }

        .restart-section {
            text-align: center;
            margin-top: 20px;
        }

        .btn-share {
            background: linear-gradient(135deg, #38f9d7, #43e97b);
            color: #155724;
            margin-right: 12px;
        }

        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(67, 233, 123, 0.4);
        }

        .share-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.95em;
            z-index: 999;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            保險大冒險
            <span class="subtitle">用輕鬆問答，體驗保險核保的世界</span>
        </h1>

        <div id="page-info" class="card fade-in">
            <h2>先來認識你一下</h2>
            <div class="form-group">
                <label>性別</label>
                <select id="gender">
                    <option value="">請選擇</option>
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                </select>
            </div>
            <div class="form-group">
                <label>年齡</label>
                <input type="number" id="age" placeholder="請輸入年齡" min="0" max="120">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>身高（公分）</label>
                    <input type="number" id="height" placeholder="例：170" min="50" max="250" step="0.1">
                </div>
                <div class="form-group">
                    <label>體重（公斤）</label>
                    <input type="number" id="weight" placeholder="例：65" min="20" max="300" step="0.1">
                </div>
            </div>
            <div id="bmi-display" class="bmi-display"></div>
            <div class="btn-group" style="justify-content: flex-end;">
                <button class="btn btn-primary" id="btn-start" disabled>開始冒險</button>
            </div>
        </div>

        <div id="page-question" class="hidden">
            <div class="progress-text" id="progress-text"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="card fade-in" id="question-card">
                <div class="question-title" id="q-title"></div>
                <div class="question-text" id="q-text"></div>
                <div class="options-grid" id="q-options"></div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btn-prev">上一題</button>
                    <button class="btn btn-primary" id="btn-next">下一題</button>
                </div>
            </div>
        </div>

        <div id="page-result" class="hidden">
            <div id="share-capture">
                <div class="card fade-in">
                    <h2 style="text-align:center; margin-bottom: 8px;">核保結果報告</h2>
                    <p style="text-align:center; color:#888; margin-bottom: 20px;" id="result-summary"></p>
                </div>
                <div id="result-cards"></div>
                <div class="share-footer hidden" id="share-footer">
                    <p>來挑戰看看你的核保結果吧！</p>
                    <p class="share-url">https://sjc8032.github.io/insurance-adventure/</p>
                    <p class="share-author">沈振超 保險經紀人 製作</p>
                    <p class="share-disclaimer">※ 本遊戲僅供參考，實際核保結果由保險公司依被保險人之健康狀況、職業、財務等進行綜合評估，一切以保險公司正式核保結果為準。</p>
                </div>
            </div>
            <div class="restart-section">
                <button class="btn btn-share" id="btn-share">分享結果</button>
                <button class="btn btn-primary" id="btn-restart">重新挑戰</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        let gameData = GAME_DATA;
        let currentQuestion = 0;
        let questions = [];
        let userSelections = {};
        let userInfo = {};

        const encourageMessages = [
            '加油！再看一下就快完了！',
            '你很棒，繼續往下看！',
            '快到了，再堅持一下！',
            '辛苦了，再一小段就結束！',
            '保持耐心，馬上就看完囉！',
        ];

        const pageInfo = document.getElementById('page-info');
        const pageQuestion = document.getElementById('page-question');
        const pageResult = document.getElementById('page-result');
        const btnStart = document.getElementById('btn-start');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnRestart = document.getElementById('btn-restart');
        const genderSelect = document.getElementById('gender');
        const ageInput = document.getElementById('age');
        const heightInput = document.getElementById('height');
        const weightInput = document.getElementById('weight');
        const bmiDisplay = document.getElementById('bmi-display');

        function calcBMI() {
            const h = parseFloat(heightInput.value);
            const w = parseFloat(weightInput.value);
            if (!h || !w || h <= 0 || w <= 0) {
                bmiDisplay.style.display = 'none';
                return null;
            }
            const bmi = w / ((h / 100) ** 2);
            bmiDisplay.style.display = 'block';
            bmiDisplay.className = 'bmi-display';
            let label, cls;
            if (bmi < 18.5) { label = '過輕'; cls = 'bmi-warning'; }
            else if (bmi < 30) { label = '正常'; cls = 'bmi-normal'; }
            else { label = '肥胖'; cls = 'bmi-danger'; }
            bmiDisplay.classList.add(cls);
            bmiDisplay.textContent = 'BMI：' + bmi.toFixed(1) + '（' + label + '）';
            return bmi;
        }

        function validateInfo() {
            const gender = genderSelect.value;
            const age = ageInput.value;
            const bmi = calcBMI();
            btnStart.disabled = !(gender && age && bmi);
        }

        genderSelect.addEventListener('change', validateInfo);
        ageInput.addEventListener('input', validateInfo);
        heightInput.addEventListener('input', validateInfo);
        weightInput.addEventListener('input', validateInfo);

        btnStart.addEventListener('click', function() {
            userInfo = {
                gender: genderSelect.value,
                age: parseInt(ageInput.value),
                height: parseFloat(heightInput.value),
                weight: parseFloat(weightInput.value),
                bmi: parseFloat(weightInput.value) / ((parseFloat(heightInput.value) / 100) ** 2)
            };
            questions = gameData.questions.filter(function(q) {
                if (q.gender === 'female' && userInfo.gender === 'male') return false;
                return true;
            });
            userSelections = {};
            currentQuestion = 0;
            pageInfo.classList.add('hidden');
            pageQuestion.classList.remove('hidden');
            renderQuestion();
        });

        function highlightQuestion(text, highlights) {
            if (!highlights || highlights.length === 0) return text;
            let result = text;
            highlights.forEach(function(h) {
                result = result.replace(new RegExp(h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'),
                    '<span class="highlight">' + h + '</span>');
            });
            return result;
        }

        // 點選選項時只切換樣式，不重繪整頁
        function toggleOption(idx) {
            var q = questions[currentQuestion];
            var sel = userSelections[q.id] || [];
            if (sel.includes(idx)) {
                sel = sel.filter(function(i) { return i !== idx; });
            } else {
                sel.push(idx);
            }
            userSelections[q.id] = sel;
            updateOptionStyles();
        }

        function clearSelections() {
            var q = questions[currentQuestion];
            userSelections[q.id] = [];
            updateOptionStyles();
        }

        function updateOptionStyles() {
            var q = questions[currentQuestion];
            var sel = userSelections[q.id] || [];
            var optionsDiv = document.getElementById('q-options');
            var items = optionsDiv.querySelectorAll('.option-item:not(.none-option)');
            items.forEach(function(item) {
                var idx = parseInt(item.getAttribute('data-idx'));
                if (sel.includes(idx)) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
            var noneItem = optionsDiv.querySelector('.none-option');
            if (noneItem) {
                if (sel.length === 0) {
                    noneItem.classList.add('selected');
                } else {
                    noneItem.classList.remove('selected');
                }
            }
        }

        function renderQuestion() {
            var q = questions[currentQuestion];
            var total = questions.length;

            document.getElementById('progress-text').textContent = '第 ' + (currentQuestion + 1) + ' 題 / 共 ' + total + ' 題';
            document.getElementById('progress-fill').style.width = ((currentQuestion + 1) / total * 100) + '%';
            document.getElementById('q-title').textContent = q.title;
            document.getElementById('q-text').innerHTML = highlightQuestion(q.question, q.highlights);

            var optionsDiv = document.getElementById('q-options');
            optionsDiv.innerHTML = '';

            var selected = userSelections[q.id] || [];

            var options = q.options.filter(function(opt) {
                if (userInfo.gender === 'female' && opt.label.includes('(男性)')) return false;
                if (userInfo.gender === 'male' && opt.label.includes('(女性)')) return false;
                return true;
            });

            var hasCategoryNames = q.categoryNames;
            var encourageInterval = 15;
            var optionCounter = 0;

            function createOptionDiv(opt, idx, isSelected) {
                var div = document.createElement('div');
                div.className = 'option-item' + (isSelected ? ' selected' : '');
                div.setAttribute('data-idx', idx);
                div.innerHTML = '<div class="option-check"></div><span class="option-label">' + opt.label + '</span>';
                div.addEventListener('click', function() { toggleOption(idx); });
                return div;
            }

            function maybeAddEncourage(counter, totalOpts) {
                if (counter > 0 && counter % encourageInterval === 0 && counter < totalOpts) {
                    var msgDiv = document.createElement('div');
                    msgDiv.className = 'encourage-msg';
                    msgDiv.textContent = encourageMessages[Math.floor(Math.random() * encourageMessages.length)];
                    optionsDiv.appendChild(msgDiv);
                }
            }

            if (hasCategoryNames) {
                var categoryOrder = Object.keys(q.categoryNames);
                var grouped = {};
                categoryOrder.forEach(function(cat) { grouped[cat] = []; });
                options.forEach(function(opt, i) {
                    var cat = opt.category || categoryOrder[categoryOrder.length - 1];
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push({ opt: opt, idx: i });
                });

                categoryOrder.forEach(function(cat) {
                    if (!grouped[cat] || grouped[cat].length === 0) return;
                    var header = document.createElement('div');
                    header.className = 'category-header';
                    header.textContent = cat + '. ' + q.categoryNames[cat];
                    optionsDiv.appendChild(header);

                    grouped[cat].forEach(function(item) {
                        optionCounter++;
                        optionsDiv.appendChild(createOptionDiv(item.opt, item.idx, selected.includes(item.idx)));
                        maybeAddEncourage(optionCounter, options.length);
                    });
                });
            } else {
                options.forEach(function(opt, idx) {
                    optionCounter++;
                    optionsDiv.appendChild(createOptionDiv(opt, idx, selected.includes(idx)));
                    maybeAddEncourage(optionCounter, options.length);
                });
            }

            // 「以上皆無」放最下面
            var noneDiv = document.createElement('div');
            noneDiv.className = 'option-item none-option' + (selected.length === 0 ? ' selected' : '');
            noneDiv.innerHTML = '<div class="option-check"></div><span class="option-label">以上皆無</span>';
            noneDiv.addEventListener('click', function() { clearSelections(); });
            optionsDiv.appendChild(noneDiv);

            btnPrev.style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
            btnNext.textContent = currentQuestion === total - 1 ? '查看結果' : '下一題';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        btnNext.addEventListener('click', function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        });

        btnPrev.addEventListener('click', function() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });

        function showResult() {
            var rates = { major: 100, medical: 100, life: 100, cancer: 100 };
            var specials = { major: [], medical: [], life: [], cancer: [] };
            var details = { major: [], medical: [], life: [], cancer: [] };
            var insuranceKeys = ['major', 'medical', 'life', 'cancer'];

            var bmiRules = gameData.bmiRules;
            var bmiRule = null;
            if (userInfo.bmi < 18.5) bmiRule = bmiRules.find(function(r) { return r.range === 'underweight'; });
            else if (userInfo.bmi < 30) bmiRule = bmiRules.find(function(r) { return r.range === 'normal'; });
            else bmiRule = bmiRules.find(function(r) { return r.range === 'obese'; });

            if (bmiRule) {
                insuranceKeys.forEach(function(key) {
                    if (bmiRule.rates[key] > 0) {
                        rates[key] += bmiRule.rates[key];
                        details[key].push('BMI ' + userInfo.bmi.toFixed(1) + '（' + bmiRule.label + '）→ +' + bmiRule.rates[key] + '%');
                    }
                });
            }

            questions.forEach(function(q) {
                var selected = userSelections[q.id] || [];
                var filteredOptions = q.options.filter(function(opt) {
                    if (userInfo.gender === 'female' && opt.label.includes('(男性)')) return false;
                    if (userInfo.gender === 'male' && opt.label.includes('(女性)')) return false;
                    return true;
                });
                selected.forEach(function(idx) {
                    var opt = filteredOptions[idx];
                    if (!opt) return;
                    insuranceKeys.forEach(function(key) {
                        if (opt.rates[key] > 0) {
                            rates[key] += opt.rates[key];
                            details[key].push(opt.label + ' → +' + opt.rates[key] + '%');
                        }
                        if (opt.special && opt.special[key]) {
                            specials[key].push({ type: opt.special[key], label: opt.label });
                        }
                    });
                });
            });

            var excludeNames = {
                EXCLUDE_EAR: '耳部', EXCLUDE_BRAIN: '腦部', EXCLUDE_GI: '消化系統',
                EXCLUDE_PANCREAS: '胰臟', EXCLUDE_KIDNEY: '腎臟', EXCLUDE_EYE: '眼部',
                EXCLUDE_THYROID: '甲狀腺', EXCLUDE_BREAST: '乳房', EXCLUDE_BONE: '骨骼',
                EXCLUDE_MENTAL: '精神疾病', EXCLUDE_SPEECH: '言語機能', EXCLUDE_LIMB: '四肢',
                EXCLUDE_UTERUS: '子宮', EXCLUDE_PREGNANCY: '懷孕相關', EXCLUDE_LIVER: '肝臟',
                EXCLUDE_VEIN: '血管', EXCLUDE_GALL: '膽囊', EXCLUDE_STONE: '結石',
                EXCLUDE_URINARY: '泌尿系統', EXCLUDE_JOINT: '關節', EXCLUDE_SPINE: '脊椎',
                EXCLUDE_NOSE: '鼻部', EXCLUDE_THROAT: '咽喉', EXCLUDE_PROSTATE: '前列腺',
                EXCLUDE_TESTICLE: '睪丸', EXCLUDE_HERNIA: '疝氣', EXCLUDE_PELVIS: '骨盆腔',
                EXCLUDE_VAGINA: '陰道', EXCLUDE_CHECK: '檢查相關', EXCLUDE_NERVE: '神經',
                EXCLUDE_SKIN: '皮膚', EXCLUDE_WOUND: '傷口'
            };

            var thresholds = gameData.config.thresholds;
            var insuranceNames = {
                major: '重大傷病險', medical: '醫療險', life: '壽險', cancer: '癌症險'
            };

            var resultCardsDiv = document.getElementById('result-cards');
            resultCardsDiv.innerHTML = '';
            var shareItems = [];

            insuranceKeys.forEach(function(key) {
                var rate = rates[key];
                var sp = specials[key];
                var hasDefer = sp.some(function(s) { return s.type === 'DEFER'; });
                var excludes = sp.filter(function(s) { return s.type.startsWith('EXCLUDE_'); });
                var uniqueExcludes = [];
                var seen = {};
                excludes.forEach(function(e) {
                    if (!seen[e.type]) { seen[e.type] = true; uniqueExcludes.push(e.type); }
                });

                var resultText, badgeClass, multiplierText = '';

                if (hasDefer) {
                    resultText = '延期承保';
                    badgeClass = 'badge-defer';
                } else if (rate > 250) {
                    resultText = '拒保';
                    badgeClass = 'badge-decline';
                } else {
                    var t = thresholds.find(function(t) { return rate >= t.min && rate <= t.max; });
                    if (t) {
                        resultText = t.result;
                        if (t.multiplier === 1.0) badgeClass = 'badge-standard';
                        else if (t.multiplier === 1.25) { badgeClass = 'badge-light'; multiplierText = '保費 × 1.25'; }
                        else if (t.multiplier === 1.5) { badgeClass = 'badge-medium'; multiplierText = '保費 × 1.5'; }
                        else if (t.multiplier === 2.0) { badgeClass = 'badge-heavy'; multiplierText = '保費 × 2.0'; }
                        else { badgeClass = 'badge-decline'; }
                    } else {
                        resultText = '拒保';
                        badgeClass = 'badge-decline';
                    }
                }

                var html = '<div class="result-card fade-in">' +
                    '<div class="result-header">' +
                    '<span class="result-insurance-name">' + insuranceNames[key] + '</span>' +
                    '<span class="result-badge ' + badgeClass + '">' + resultText + '</span></div>' +
                    '<div class="result-rate" style="color:' + (badgeClass === 'badge-standard' ? '#28a745' : badgeClass === 'badge-decline' ? '#c0392b' : '#e67e22') + '">' + rate + '%</div>';

                if (multiplierText) {
                    html += '<div class="multiplier-info">' + multiplierText + '</div>';
                }

                if (uniqueExcludes.length > 0) {
                    html += '<div class="exclude-list"><strong>除外部位：</strong><br>';
                    uniqueExcludes.forEach(function(ex) {
                        html += '<span>' + (excludeNames[ex] || ex) + '</span>';
                    });
                    html += '</div>';
                }

                if (hasDefer) {
                    var deferItems = sp.filter(function(s) { return s.type === 'DEFER'; });
                    html += '<div class="exclude-list" style="background:#e2d5f1;"><strong>延期原因：</strong><br>';
                    deferItems.forEach(function(d) {
                        html += '<span style="color:#4a2d7a;">' + d.label + '</span>';
                    });
                    html += '</div>';
                }

                if (details[key].length > 0) {
                    html += '<div class="result-details"><h4>加費明細</h4><ul>';
                    details[key].forEach(function(d) {
                        html += '<li>' + d + '</li>';
                    });
                    html += '</ul></div>';
                }

                html += '</div>';
                resultCardsDiv.innerHTML += html;
                shareItems.push({ name: insuranceNames[key], resultText: resultText, rate: rate, multiplier: multiplierText });
            });

            var summaryText = (userInfo.gender === 'male' ? '男性' : '女性') + '，' + userInfo.age + ' 歲，BMI ' + userInfo.bmi.toFixed(1);
            document.getElementById('result-summary').textContent = summaryText;

            lastResultData = { summary: summaryText, items: shareItems };

            pageQuestion.classList.add('hidden');
            pageResult.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 分享結果
        var lastResultText = '';
        var lastResultData = null;

        function buildShareText(resultData) {
            var lines = ['【保險大冒險】核保結果報告'];
            lines.push(resultData.summary);
            lines.push('---');
            resultData.items.forEach(function(item) {
                var line = item.name + '：' + item.resultText + '（' + item.rate + '%）';
                if (item.multiplier) line += ' ' + item.multiplier;
                lines.push(line);
            });
            lines.push('---');
            lines.push('來挑戰看看你的核保結果吧！');
            if (window.location.href.startsWith('http')) {
                lines.push(window.location.href.split('?')[0]);
            }
            return lines.join('\n');
        }

        function showToast(msg) {
            var existing = document.querySelector('.share-toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.className = 'share-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 2500);
        }

        document.getElementById('btn-share').addEventListener('click', function() {
            if (!lastResultData) return;
            var shareBtn = document.getElementById('btn-share');
            shareBtn.disabled = true;
            shareBtn.textContent = '截圖中...';

            // 顯示分享浮水印
            var footer = document.getElementById('share-footer');
            footer.classList.remove('hidden');

            var captureEl = document.getElementById('share-capture');

            // 檢查 html2canvas 是否可用
            if (typeof html2canvas === 'undefined') {
                // html2canvas 未載入，改用文字分享
                footer.classList.add('hidden');
                shareBtn.disabled = false;
                shareBtn.textContent = '分享結果';
                var text = buildShareText(lastResultData);
                if (navigator.share) {
                    navigator.share({ title: '保險大冒險', text: text }).catch(function() {});
                } else if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(function() {
                        showToast('結果已複製到剪貼簿！');
                    });
                }
                return;
            }

            html2canvas(captureEl, {
                backgroundColor: '#764ba2',
                scale: 2,
                useCORS: true,
                scrollY: -window.scrollY
            }).then(function(canvas) {
                footer.classList.add('hidden');
                shareBtn.disabled = false;
                shareBtn.textContent = '分享結果';

                canvas.toBlob(function(blob) {
                    var file = new File([blob], 'insurance-adventure-result.png', { type: 'image/png' });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            title: '保險大冒險 — 核保結果',
                            text: '來挑戰看看你的核保結果吧！\nhttps://sjc8032.github.io/insurance-adventure/',
                            files: [file]
                        }).catch(function() {});
                    } else {
                        var link = document.createElement('a');
                        link.download = 'insurance-adventure-result.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        showToast('結果圖片已下載！');
                    }
                }, 'image/png');
            }).catch(function() {
                footer.classList.add('hidden');
                shareBtn.disabled = false;
                shareBtn.textContent = '分享結果';
                var text = buildShareText(lastResultData);
                if (navigator.share) {
                    navigator.share({ title: '保險大冒險', text: text }).catch(function() {});
                } else if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(function() {
                        showToast('截圖失敗，已複製文字結果');
                    });
                }
            });
        });

        btnRestart.addEventListener('click', function() {
            pageResult.classList.add('hidden');
            pageInfo.classList.remove('hidden');
            genderSelect.value = '';
            ageInput.value = '';
            heightInput.value = '';
            weightInput.value = '';
            bmiDisplay.style.display = 'none';
            btnStart.disabled = true;
            userSelections = {};
            currentQuestion = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();
    </script>
</body>
</html>
